git:
  filters:
  - filter_type: dir
    # all supported i18n types: https://docs.transifex.com/formats
    source_file_extension: GITHUBMARKDOWN
    source_language: en
    source_file_dir: the_source_files/
        # path expression to translation files, must contain <lang> placeholder
    translation_files_expression: 'path/to/translation_<lang>.po'
