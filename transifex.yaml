git:
  filters:
  - filter_type: dir
      # all supported i18n types: https://docs.transifex.com/formats
      file_format: GITHUBMARKDOWN 
      source_file_extension: md
      source_language: en  
      source_file_dir: trans_files/
      # path expression to translation files, must contain <lang> placeholder
      translation_files_expression: 'trans_files/README_<lang>.md'
- filter_type: dir
      # all supported i18n types: https://docs.transifex.com/formats
      file_format: GITHUBMARKDOWN 
      source_file_extension: md
      source_language: en  
      source_file_dir: the_source_files/en/
      # path expression to translation files, must contain <lang> placeholder
      translation_files_expression: 'translations/<lang>'
filters:
  - filter_type: dir
    file_format: GITHUBMARKDOWN
    source_file_extension: md
    source_language: en
    source_file_dir: trans_files/
    translation_files_expression: 'trans_files/<lang>'

# valid
filters:
  - filter_type: dir
    file_format: GITHUBMARKDOWN
    source_file_extension: md
    source_language: en
    source_file_dir: trans_files/
    translation_files_expression: 'trans_files/<lang>'